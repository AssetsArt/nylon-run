name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-14
            use-cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          TARGET_DIR="target/${{ matrix.target }}/release"

          if [ -f "$TARGET_DIR/nyrun" ]; then
            cp "$TARGET_DIR/nyrun" "dist/nyrun"
            strip "dist/nyrun" 2>/dev/null || true
          fi

          cd dist
          tar czf "nyrun-${{ matrix.platform }}.tar.gz" nyrun
          sha256sum "nyrun-${{ matrix.platform }}.tar.gz" > "nyrun-${{ matrix.platform }}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: nyrun-${{ matrix.platform }}
          path: |
            dist/nyrun-${{ matrix.platform }}.tar.gz
            dist/nyrun-${{ matrix.platform }}.tar.gz.sha256

  release:
    name: Create Release
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/nyrun-*/; do
            [ -d "$dir" ] || continue
            cp "$dir"*.tar.gz release-assets/ 2>/dev/null || true
            cp "$dir"*.sha256 release-assets/ 2>/dev/null || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
