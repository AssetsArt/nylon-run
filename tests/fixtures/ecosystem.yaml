kind: ConfigMap
metadata:
  name: test-config
data:
  app.conf: |
    debug=true
    log_level=info
  settings.json: |
    {"version": 1, "feature_flags": ["beta"]}
---
kind: Process
metadata:
  name: web
spec:
  path: python3
  args: "/tests/fixtures/http-server.py"
  port: "7001:7001"
  env:
    APP_NAME: web-test
  volumes:
    - configmap:test-config:/etc/app
---
kind: Process
metadata:
  name: worker
spec:
  path: python3
  args: "/tests/fixtures/http-server.py"
  env:
    PORT: "8002"
